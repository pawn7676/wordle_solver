<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Wordle Solver</title>

    <!-- PWA / Add to Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Wordle Solver">
    <meta name="theme-color" content="#121213">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-180.png">
    <link rel="icon" type="image/png" href="icon-512.png">
    <style>
        :root {
            /* Change --tile-size and entire layout width follows. */
            --tile-size: 95px;
            --tile-gap: 6px;
            /* Wordle dark-mode grey: tiles, header buttons, toggle */
            --grey: #3a3a3c;
            --app-width: calc(var(--tile-size) * 5 + var(--tile-gap) * 4);
        }
        html { background: #121213; -webkit-text-size-adjust: 100%; touch-action: manipulation; }
        body {
            font-family: sans-serif; background: #121213; color: white;
            max-width: var(--app-width); margin: auto;
            padding: calc(36px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right))
                     calc(20px + env(safe-area-inset-bottom)) calc(20px + env(safe-area-inset-left));
            -webkit-tap-highlight-color: transparent;
        }

        .header-row { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 24px; }
        .header-left { display: flex; align-items: center; gap: 10px; }

        #resetBtn, #backBtn {
            width: 34px; height: 34px; flex: none; padding: 0;
            display: flex; align-items: center; justify-content: center;
            background: var(--grey); color: #d7dadc; border-radius: 50%;
            font-size: 18px; line-height: 1;
        }
        #resetBtn:active, #backBtn:active { background: #538d4e; color: white; }
        /* Revealed by JS only when a touch user summons keyboard */
        #backBtn { display: none; }
        #resetBtn.spinning { animation: spin .8s linear infinite; opacity: .6; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .stats { 
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 0; 
            font-size: 14px; 
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }
        @media (min-width: 480px) { .stats { grid-template-columns: repeat(5, 1fr); } }
        .A { color: #6aaa64; } .O { color: #5dade2; } .X { color: #f1c40f; } .U { color: #b39ddb; } .Z { color: #ff4d4d; }
        
        .settings { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #818384; text-transform: uppercase; font-weight: bold; }
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--grey); transition: .4s; border-radius: 18px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #538d4e; }
        input:checked + .slider:before { transform: translateX(16px); }

        .guess-tiles { position: relative; }
        .tile-row { display: flex; gap: var(--tile-gap); justify-content: center; }
        .tile {
            flex: 1 1 0; aspect-ratio: 1 / 1; min-width: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 38px; font-weight: bold; color: white;
            border: 2px solid var(--grey); border-radius: 4px;
            background: transparent; box-sizing: border-box;
            transition: background-color .15s ease, border-color .15s ease;
        }
        .tile.b { background: var(--grey); border-color: var(--grey); }
        .tile.y { background: #b59f3b; border-color: #b59f3b; }
        .tile.g { background: #538d4e; border-color: #538d4e; }
        .tile { cursor: pointer; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: manipulation; }
        .tile .tl { pointer-events: none; }
        .tile:active { transform: scale(0.94); }
        @supports (font-size: 1cqw) { .tile-row { container-type: inline-size; } .tile { font-size: 10cqw; } }


        /* Invisible input keeps the keyboard working; taps pass through to tiles */
        #guessInput { pointer-events: none; }
        #guessInput {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; font-size: 16px; padding: 0; border: none; background: transparent;
        }

        .input-container {
            display: flex; flex-direction: column; gap: 12px;
            margin: 0 auto 20px;
        }
        .input-container button { width: 100%; }
        input[type="text"] { padding: 12px; font-size: 16px; border-radius: 4px; border: 1px solid #3a3a3c; background: #3a3a3c; color: white; width: 100%; box-sizing: border-box; }
        
        button { padding: 12px; font-size: 16px; border-radius: 4px; border: none; background: #538d4e; color: white; cursor: pointer; font-weight: bold; }
        #computeBtn { background: #2d5a88; }
        
        #output { padding: 0; margin-top: 10px; font-size: 15px; font-family: monospace; }
        
        .row-container { display: flex; align-items: center; justify-content: center; padding: 2px 0; width: 100%; }
        .col-rank { width: 35px; color: #818384; }
        .col-word { width: 180px; font-weight: bold; }
        .col-entropy { width: 100px; text-align: center; }
        .col-years { width: 80px; text-align: center; }

        .header-line { 
            display: flex; 
            justify-content: center;
            align-items: center; 
            padding-bottom: 8px; 
            border-bottom: 1px solid #3a3a3c; 
            margin-bottom: 8px;
            color: #818384;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
        }
        .head-title { width: 215px; }
        .head-entropy { width: 100px; text-align: center; }
        .head-years { width: 80px; text-align: center; }

        #output:empty { display: none; }
        hr { border: 0; height: 1px; background: #3a3a3c; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="header-row">
        <div class="header-left">
            <h1>Wordle Solver</h1>
            <button id="resetBtn" onclick="resetPuzzle()" title="Start a new puzzle" aria-label="Start a new puzzle">&#8635;</button>
            <button id="backBtn" onclick="backspaceKey()" title="Delete last letter" aria-label="Delete last letter">&#9003;</button>
        </div>
        <div class="settings">
            <span>Exclude Answers</span>
            <label class="switch">
                <input type="checkbox" id="filterToggle" checked onchange="applyFilters()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="stats" id="stats">
        <div class="A">ANS: <span id="answerCount">0</span></div>
        <div class="O">ORIG: <span id="originalCount">0</span></div>
        <div class="X">EXT: <span id="extendedCount">0</span></div>
        <div class="U">UNLIK: <span id="unlikelyCount">0</span></div>
        <div class="Z">ZERO: <span id="zeroChanceCount">0</span></div>
    </div>    

    <div class="input-container">
        <div class="guess-tiles" id="guessTiles">
            <div class="tile-row">
                <div class="tile" data-i="0"></div><div class="tile" data-i="1"></div>
                <div class="tile" data-i="2"></div><div class="tile" data-i="3"></div>
                <div class="tile" data-i="4"></div>
            </div>
            <input type="text" id="guessInput" maxlength="5" aria-label="Guess"
                   autocapitalize="off" autocorrect="off" autocomplete="off" spellcheck="false">
        </div>
        <button onclick="handleTurn()">Submit Turn</button>
        <button id="computeBtn" onclick="runFullAnalysis()">Compute Entropy</button>
    </div>
    <div id="output"></div>

    <script>
        class Word {
            constructor(wordString, category, date) {
                this.wordString = wordString;
                this.category = category;
                this.answerDate = date ? new Date(date) : null;
                this.entropy = 0;
            }
        }

        let allWords = [];
        let possibleAnswers = [];
        let moveHistory = [];
        let CURRENT_DATE = new Date();

        async function loadWords(bustCache) {
            const url = bustCache ? 'all_words.json?v=' + Date.now() : 'all_words.json';
            const response = await fetch(url, { cache: bustCache ? 'reload' : 'default' });
            if (!response.ok) throw new Error('HTTP ' + response.status);
            const data = await response.json();
            allWords = Object.entries(data).map(([word, info]) => new Word(word, info.category, info.date));
            CURRENT_DATE = new Date();
        }

        async function init() {
            try {
                await loadWords(false);
                applyFilters();
            } catch (e) {
                document.getElementById('output').innerText = "Error loading data.";
            }
        }

        function applyFilters() {
            const excludePastAnswers = document.getElementById('filterToggle').checked;
            let filtered = allWords;
            if (excludePastAnswers) filtered = filtered.filter(w => w.category !== 'A');

            for (let i = 0; i < moveHistory.length; i++) {
                const turn = moveHistory[i];
                filtered = filtered.filter(w => generateColorPattern(w.wordString, turn.guess) === turn.pattern);
            }
            possibleAnswers = filtered;
            updateStats();
            if (moveHistory.length > 0) renderTopWords(99);
        }

        function generateColorPattern(answer, guess) {
            let answerArr = answer.split(''), guessArr = guess.split('');
            let pattern = Array(5).fill('b'), counts = {};
            for (let char of answerArr) counts[char] = (counts[char] || 0) + 1;
            for (let i = 0; i < 5; i++) {
                if (guessArr[i] === answerArr[i]) { pattern[i] = 'g'; counts[guessArr[i]]--; }
            }
            for (let i = 0; i < 5; i++) {
                if (pattern[i] === 'b' && counts[guessArr[i]] > 0) { pattern[i] = 'y'; counts[guessArr[i]]--; }
            }
            return pattern.join('');
        }

        function assignEntropy(likelyAnswers) {
            allWords.forEach(guess => {
                let patternMap = {};
                likelyAnswers.forEach(answer => {
                    let p = generateColorPattern(answer.wordString, guess.wordString);
                    patternMap[p] = (patternMap[p] || 0) + 1;
                });
                let entropy = 0, total = likelyAnswers.length;
                for (let count of Object.values(patternMap)) {
                    let prob = count / total;
                    entropy -= prob * Math.log2(prob);
                }
                guess.entropy = entropy;
            });
        }

        function handleTurn() {
            const g = guess.toLowerCase();
            const pattern = patternState.join('');
            if (g.length !== 5) return;
            moveHistory.push({ guess: g, pattern });
            applyFilters();
            clearEntry();
            document.getElementById('computeBtn').style.display = 'none';
        }

        async function resetPuzzle() {
            const btn = document.getElementById('resetBtn');
            const out = document.getElementById('output');
            moveHistory = [];
            clearEntry(false);
            document.getElementById('computeBtn').style.display = '';
            btn.disabled = true;
            btn.classList.add('spinning');
            out.innerText = "Refreshing word list...";

            try {
                await loadWords(true);
            } catch (e) { /* keep the previously loaded list */ }

            btn.disabled = false;
            btn.classList.remove('spinning');
            applyFilters();
            out.innerText = '';
            window.scrollTo(0, 0);
        }

        function updateStats() {
            const counts = { 'A': 0, 'O': 0, 'X': 0, 'U': 0, 'Z': 0 };
            possibleAnswers.forEach(w => { if(counts.hasOwnProperty(w.category)) counts[w.category]++; });
            document.getElementById('answerCount').textContent = counts.A;
            document.getElementById('originalCount').textContent = counts.O;
            document.getElementById('extendedCount').textContent = counts.X;
            document.getElementById('unlikelyCount').textContent = counts.U;
            document.getElementById('zeroChanceCount').textContent = counts.Z;
        }

        function runFullAnalysis() {
            document.getElementById('computeBtn').style.display = 'none'; 
            document.getElementById('output').innerHTML = "<em>Computing...</em>";
            setTimeout(() => { renderTopWords(99); }, 50);
        }

        function getYears(w) {
            if (w.category === 'A' && w.answerDate) {
                return (Math.abs(CURRENT_DATE - w.answerDate) / (1000 * 60 * 60 * 24 * 365.25)).toFixed(1);
            }
            return "";
        }

        function getHeaderHtml(title) {
            return `<div class="header-line">
                <div class="head-title">${title}</div>
                <div class="head-entropy">Entropy</div>
                <div class="head-years">Years</div>
            </div>`;
        }

        function getWordRow(w, index) {
            return `<div class="row-container">
                <div class="col-rank">${index + 1}</div>
                <div class="col-word ${w.category}">${w.wordString.toUpperCase()}</div>
                <div class="col-entropy">${w.entropy.toFixed(2)}</div>
                <div class="col-years">${getYears(w)}</div>
            </div>`;
        }

        function renderTopWords(num) {
            // Exclude both U (unlikely) and Z (zero chance)
            // from entropy target pool
            const targets = possibleAnswers.filter(w => ['O', 'X', 'A'].includes(w.category));
            assignEntropy(targets.length > 0 ? targets : possibleAnswers);
            
            allWords.sort((a, b) => b.entropy - a.entropy);

            // Push only Z to the bottom; U sorts with A/O/X by entropy
            possibleAnswers.sort((a, b) => {
                const priority = { 'A': 0, 'O': 0, 'X': 0, 'U': 0, 'Z': 1 };
                const pa = priority[a.category] ?? 0;
                const pb = priority[b.category] ?? 0;
                if (pa !== pb) return pa - pb;
                return b.entropy - a.entropy;
            });

            const bestPossible = possibleAnswers.find(w => !['U', 'Z'].includes(w.category));
            const bestEntropy = bestPossible ? bestPossible.entropy : 0;
            const maxEntropyWords = allWords.filter(w => w.entropy > bestEntropy + 0.01).slice(0, 5);

            let html = "";
            if (maxEntropyWords.length > 0) {
                html += getHeaderHtml("Max Entropy");
                maxEntropyWords.forEach((w, i) => html += getWordRow(w, i));
                html += "<hr>";
            }

            html += getHeaderHtml("Possible Answers");
            possibleAnswers.slice(0, num).forEach((w, i) => html += getWordRow(w, i));
            document.getElementById('output').innerHTML = html;
        }

        init();

        const gEl = document.getElementById('guessInput');
        const tiles = [...document.querySelectorAll('#guessTiles .tile')];
        const CYCLE = { b: 'y', y: 'g', g: 'b' };

        // `guess` is the single source of truth. The hidden
        // input is never used to store text — it exists only
        // so touch devices can raise the iOS keyboard, and
        // its value is drained into `guess` and cleared on
        // every keystroke.
        let guess = '';
        let patternState = ['b', 'b', 'b', 'b', 'b'];

        function clearEntry(focus = true) {
            guess = '';
            gEl.value = '';
            patternState = ['b', 'b', 'b', 'b', 'b'];
            renderTiles();
            if (focus && document.activeElement === gEl) gEl.focus();
        }

        function renderTiles() {
            const g = guess.toUpperCase();
            tiles.forEach((tile, i) => {
                tile.className = 'tile ' + patternState[i];
                tile.innerHTML = g[i] ? '<span class="tl">' + g[i] + '</span>' : '';
            });
        }

        function addLetters(str) {
            guess = (guess + str).replace(/[^a-zA-Z]/g, '').slice(0, 5);
            renderTiles();
            // Word complete — put the on-screen keyboard away
            // so the user doesn't have to reach for the
            // hide-keyboard key before setting colors.
            if (guess.length === 5) gEl.blur();
        }

        function backspace() {
            guess = guess.slice(0, -1);
            patternState = ['b', 'b', 'b', 'b', 'b'];
            renderTiles();
        }

        // Header ⌫ — the only way to edit letters on a touch
        // device once the word is complete, since tile taps
        // are set to cycling colours by then.
        function backspaceKey() {
            if (!guess) return;
            backspace();
            gEl.focus();
        }

        // Typing works with nothing focused, so the page
        // accepts keystrokes the instant it loads.
        // No click needed to "arm" the input.
        document.addEventListener('keydown', (e) => {
            if (e.metaKey || e.ctrlKey || e.altKey) return;
            if (e.key === 'Enter') { e.preventDefault(); handleTurn(); return; }
            if (e.key === 'Backspace') { e.preventDefault(); backspace(); return; }
            if (/^[a-zA-Z]$/.test(e.key)) {
                e.preventDefault();
                addLetters(e.key);
            }
        });

        // The on-screen keyboard can only be up while gEl has
        // focus, and that focus only happens when a tile is
        // tapped. So focus here is evidence of a touch user,
        // and the only reliable signal available — iOS exposes
        // no API for whether a hardware keyboard is attached.
        gEl.addEventListener('focus', () => {
            document.getElementById('backBtn').style.display = 'flex';
        }, { once: true });

        // On-screen keyboard path: characters land in the
        // hidden input, which we immediately drain so it can
        // never disagree with `guess`.
        gEl.addEventListener('input', () => {
            const typed = gEl.value;
            gEl.value = '';
            if (typed) addLetters(typed);
        });

        // With fewer than five letters a tap opens the keyboard
        // (focusing inside a click is the gesture iOS requires).
        // Once the word is complete, taps set colors and the
        // keyboard is dismissed — iOS keeps an input focused even
        // after the keyboard is hidden, so restoring focus would
        // re-summon it.
        tiles.forEach((tile, i) => {
            tile.addEventListener('click', () => {
                if (guess.length < 5) { gEl.focus(); return; }
                patternState[i] = CYCLE[patternState[i]];
                renderTiles();
                gEl.blur();
            });
        });

        renderTiles();
    </script>
</body>
</html>
